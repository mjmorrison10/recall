name: Refresh arena.ai ranking

# Regenerates arena-ranking.json (the ordering for the OpenRouter model picker)
# from arena.ai's live text leaderboard. Runs weekly, and can be run on demand
# from the Actions tab via the "Run workflow" button.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1" # Mondays 08:17 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate arena-ranking.json
        run: node scripts/refresh-leaderboard.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- arena-ranking.json; then
            echo "No ranking change."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add arena-ranking.json
            git commit -m "chore: refresh arena.ai ranking [skip ci]"
            git push
          fi
